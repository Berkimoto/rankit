<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join RankIt Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #2E3440;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 900; color: #F5C200; margin-bottom: 8px; }
    p  { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 24px; }
    .code {
      background: rgba(245,194,0,0.15);
      border: 1.5px solid #F5C200;
      border-radius: 12px;
      padding: 16px;
      font-size: 32px;
      font-weight: 900;
      color: #F5C200;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      background: #F5C200;
      color: #2E3440;
      font-size: 15px;
      font-weight: 900;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-secondary {
      display: block;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      padding: 8px;
      text-decoration: none;
    }
    .status {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎯</div>
    <h1>You're invited!</h1>
    <p>Join this RankIt game</p>
    <div class="code" id="roomCode">---</div>
    <a class="btn" id="openApp" href="#">Open in RankIt</a>
    <a class="btn-secondary" id="downloadApp" href="https://apps.apple.com/app/id6767127584">
      Don't have the app? Download RankIt →
    </a>
    <p class="status" id="status">Opening RankIt...</p>
  </div>

  <script>
    // URL'den room code'u al
    // /rankit/join/ABC123 formatı
    const pathParts = window.location.pathname.split('/');
    const joinIndex = pathParts.indexOf('join');
    const roomCode  = joinIndex !== -1 ? pathParts[joinIndex + 1] : null;

    if (roomCode) {
      document.getElementById('roomCode').textContent = roomCode;

      // Deep link URL
      const deepLink    = `rankit://join/${roomCode}`;
      const universalLink = `rankit://join/${roomCode}`;

      // Open in app butonu
      document.getElementById('openApp').href = deepLink;

      // Otomatik deep link dene
      const start = Date.now();
      window.location.href = deepLink;

      // 2.5sn sonra hâlâ bu sayfadaysak uygulama yüklü değil demektir
      setTimeout(() => {
        if (Date.now() - start < 3000) {
          // App Store'a yönlendir
          const isAndroid = /android/i.test(navigator.userAgent);
          const storeUrl = isAndroid
            ? 'https://play.google.com/store/apps/details?id=com.laineberksoy.rankit'
            : 'https://apps.apple.com/app/id6767127584';

          document.getElementById('status').textContent =
            "RankIt is not installed. Redirecting to the App Store...";

          setTimeout(() => {
            window.location.href = storeUrl;
          }, 1500);
        }
      }, 2500);
    } else {
      document.getElementById('roomCode').textContent = '???';
      document.getElementById('status').textContent = 'Invalid link.';
    }
  </script>
</body>
</html>
